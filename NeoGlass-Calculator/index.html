<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  
  <title>NeoGlass Calculator | Premium UI by Neha Biswal</title>
  <meta name="description" content="A handcrafted premium glassmorphism calculator — history panel, live expression, keyboard support, and elegant operator glow effects." />

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- bg -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- glow -->
  <div class="ambient-blob blob-1" aria-hidden="true"></div>
  <div class="ambient-blob blob-2" aria-hidden="true"></div>
  <div class="ambient-blob blob-3" aria-hidden="true"></div>

  <!-- main -->
  <main class="calculator-wrapper" role="main">

  <!-- history -->
       <aside
      class="history-panel"
      id="history-panel"
      aria-label="Calculation history"
      aria-hidden="true"
    >
      <!-- header -->
      <div class="history-header">
        <span class="history-title">History</span>
        <!-- clear -->
        <button
          class="history-clear-btn"
          id="history-clear-btn"
          aria-label="Clear all history"
          title="Clear history"
        >
          <!-- icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Clear
        </button>
      </div>

     <!-- list -->
      <ul class="history-list" id="history-list" aria-label="Past calculations" role="list">
      </ul>

      <!-- empty -->
      <div class="history-empty" id="history-empty" aria-hidden="true">
        <span class="history-empty-icon" aria-hidden="true">∅</span>
        <p>No calculations yet</p>
      </div>
    </aside>

    <!-- calc -->
    <article class="calculator" id="calculator" aria-label="NeoGlass Calculator">

      <!-- top -->
      <header class="top-bar">
        <div class="brand-label">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-name">NeoGlass</span>
        </div>

        <div class="top-bar-right">
          <!-- History toggle button -->
          <button
            class="history-toggle-btn"
            id="history-toggle-btn"
            aria-label="Toggle history panel"
            aria-expanded="false"
            aria-controls="history-panel"
            title="Calculation history"
          >
            <!-- Clock / history icon -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="history-toggle-label">History</span>
          </button>

          <!-- badge -->
          <span class="mode-badge" id="mode-badge">CALC</span>
        </div>
      </header>

      <!-- ── Display screen ────────────────────────────── -->
      <section class="display-section" aria-label="Calculator display">

      <!-- shine -->
        <div class="display-reflection" aria-hidden="true"></div>

            <div
          class="expression-display"
          id="expression-display"
          aria-live="polite"
          aria-label="Expression"
        >&nbsp;</div>

        <!-- Main large result number -->
        <div
          class="main-display"
          id="main-display"
          aria-live="assertive"
          aria-label="Current value"
        >0</div>

        <!-- Bottom scan line -->
        <div class="display-scanline" aria-hidden="true"></div>

      </section>

            <section class="button-grid" aria-label="Calculator buttons">

        <!-- Row 1 -->
        <button class="btn btn-control"                    id="btn-ac"  data-action="clear"    aria-label="All Clear">AC</button>
        <button class="btn btn-control"                    id="btn-del" data-action="delete"   aria-label="Delete last">DEL</button>
        <button class="btn btn-operator btn-utility"       id="btn-pct" data-action="percent"  aria-label="Percent">%</button>
        <button class="btn btn-operator"                   id="btn-div" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-number" id="btn-7" data-action="number" data-value="7" aria-label="7">7</button>
        <button class="btn btn-number" id="btn-8" data-action="number" data-value="8" aria-label="8">8</button>
        <button class="btn btn-number" id="btn-9" data-action="number" data-value="9" aria-label="9">9</button>
        <button class="btn btn-operator"          id="btn-mul" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-number" id="btn-4" data-action="number" data-value="4" aria-label="4">4</button>
        <button class="btn btn-number" id="btn-5" data-action="number" data-value="5" aria-label="5">5</button>
        <button class="btn btn-number" id="btn-6" data-action="number" data-value="6" aria-label="6">6</button>
        <button class="btn btn-operator"          id="btn-sub" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-number" id="btn-1" data-action="number" data-value="1" aria-label="1">1</button>
        <button class="btn btn-number" id="btn-2" data-action="number" data-value="2" aria-label="2">2</button>
        <button class="btn btn-number" id="btn-3" data-action="number" data-value="3" aria-label="3">3</button>
        <button class="btn btn-operator"          id="btn-add" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-number btn-zero" id="btn-0"   data-action="number"  data-value="0" aria-label="0">0</button>
        <button class="btn btn-number"          id="btn-dot" data-action="decimal"               aria-label="Decimal point">.</button>
        <button class="btn btn-equal"           id="btn-eq"  data-action="equal"                aria-label="Equals">=</button>

      </section>

    </article>

  </main>

  <script src="script.js"></script>
</body>
</html>
